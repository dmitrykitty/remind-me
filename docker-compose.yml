services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    volumes:
      # Persist SQLite DB and model data across restarts
      - backend-data:/app/data
      # Mount Google Cloud ADC credentials (Vertex AI auth)
      - ${GOOGLE_APPLICATION_CREDENTIALS:-~/.config/gcloud/application_default_credentials.json}:/root/.config/gcloud/application_default_credentials.json:ro
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_FISHJAM_ID: ${VITE_FISHJAM_ID:-}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
